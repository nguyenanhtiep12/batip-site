name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - hi-morse-web
  workflow_dispatch:
    inputs:
      hi_morse_ref:
        description: Hi Morse git ref to build
        required: false
        default: main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Hi Morse
        uses: actions/checkout@v4
        with:
          repository: nguyenanhtiep12/Learn-Morse
          ref: ${{ github.event.client_payload.ref || github.event.inputs.hi_morse_ref || 'main' }}
          path: Learn-Morse
          token: ${{ secrets.HI_MORSE_REPOSITORY_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build
        env:
          HI_MORSE_SOURCE: ${{ github.workspace }}/Learn-Morse/learn_morse
        run: npm run build

      - name: Check
        run: npm run check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
